<svg xmlns="http://www.w3.org/2000/svg" width="720" height="1480" viewBox="0 0 720 1480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060709" />
      <stop offset="45%" stop-color="#0d1014" />
      <stop offset="100%" stop-color="#11161c" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#242a33" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#0f141b" stop-opacity="0.98" />
    </linearGradient>
    <linearGradient id="buttonFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3e4651" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#222931" stop-opacity="0.88" />
    </linearGradient>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4d1dc" />
      <stop offset="100%" stop-color="#819985" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <style>
      .title { fill: #f2f5f8; font: 700 28px Bahnschrift, Arial, sans-serif; letter-spacing: 1px; }
      .headline { fill: #f2f5f8; font: 700 24px Bahnschrift, Arial, sans-serif; }
      .body { fill: #d9e0e7; font: 600 16px Bahnschrift, Arial, sans-serif; }
      .muted { fill: #9ea7b1; font: 600 13px Bahnschrift, Arial, sans-serif; }
      .eyebrow { fill: #bfc8d1; font: 700 12px Bahnschrift, Arial, sans-serif; letter-spacing: 2px; text-transform: uppercase; }
      .buttonText { fill: #edf1f5; font: 700 15px Bahnschrift, Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .chipText { fill: #d8e0e7; font: 700 14px Bahnschrift, Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .navText { fill: #edf1f5; font: 700 17px Bahnschrift, Arial, sans-serif; text-anchor: middle; }
      .small { fill: #edf1f5; font: 700 12px Bahnschrift, Arial, sans-serif; }
    </style>
  </defs>

  <rect id="background" width="720" height="1480" fill="url(#bg)" />

  <g id="screen-work" filter="url(#shadow)">
    <g id="card-header">
      <rect x="44" y="48" width="632" height="214" rx="28" fill="url(#card)" stroke="rgba(205,214,224,0.22)" />
      <text class="eyebrow" x="70" y="88">WORK</text>
      <text class="title" x="70" y="126">Day 2</text>
      <text class="body" x="360" y="170" text-anchor="middle">Tuesday shift - James @</text>
      <text class="body" x="360" y="204" text-anchor="middle">The company</text>

      <g id="button-show-header">
        <rect x="408" y="108" width="92" height="58" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="chipText" x="454" y="138">Show</text>
      </g>

      <g id="button-active-events">
        <rect x="520" y="96" width="146" height="70" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="593" y="131">Active Events 2</text>
      </g>
    </g>

    <g id="card-current-task">
      <rect x="44" y="296" width="632" height="468" rx="28" fill="url(#card)" stroke="rgba(205,214,224,0.22)" />
      <text class="eyebrow" x="70" y="338">CURRENT TASK</text>
      <text class="headline" x="70" y="374">Checkout Supplies</text>

      <g id="chip-progress">
        <rect x="598" y="320" width="54" height="54" rx="27" fill="rgba(201,209,219,0.08)" stroke="rgba(230,235,242,0.16)" />
        <text class="chipText" x="625" y="348">2/3</text>
      </g>

      <g id="task-summary">
        <rect x="70" y="404" width="580" height="126" rx="22" fill="rgba(255,255,255,0.03)" stroke="rgba(168,188,175,0.55)" />
        <text class="body" x="92" y="444">Checkout Supplies</text>
        <text class="body" x="620" y="444" text-anchor="end">2/3</text>
        <rect x="92" y="466" width="536" height="10" rx="5" fill="rgba(255,255,255,0.08)" />
        <rect x="92" y="466" width="366" height="10" rx="5" fill="url(#progress)" />
        <text class="small" x="92" y="512">supplier</text>
      </g>

      <g id="notice-supplier-cart">
        <rect x="70" y="552" width="580" height="86" rx="18" fill="rgba(133,58,41,0.2)" stroke="rgba(212,120,94,0.35)" />
        <text class="body" x="92" y="586">Add the needed items to the supplier cart before</text>
        <text class="body" x="92" y="614">checkout: 2x Anchor Set, 1x Board Pack.</text>
      </g>

      <g id="button-supplier-cart">
        <rect x="70" y="656" width="188" height="58" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="164" y="685">Supplier Cart</text>
      </g>

      <g id="carousel-arrows">
        <rect x="70" y="732" width="52" height="52" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="96" y="758">&lt;</text>
        <rect x="130" y="732" width="52" height="52" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="156" y="758">&gt;</text>
      </g>

      <g id="carousel-actions">
        <rect x="70" y="804" width="168" height="64" rx="18" fill="url(#buttonFill)" stroke="rgba(235,241,248,0.36)" />
        <text class="buttonText" x="154" y="836">Rush</text>
        <rect x="254" y="804" width="168" height="64" rx="18" fill="url(#buttonFill)" stroke="rgba(235,241,248,0.36)" />
        <text class="buttonText" x="338" y="836">Standard</text>
        <rect x="438" y="804" width="212" height="64" rx="18" fill="url(#buttonFill)" stroke="rgba(235,241,248,0.36)" />
        <text class="buttonText" x="544" y="836">Careful</text>
      </g>
    </g>

    <g id="card-active-job">
      <rect x="44" y="796" width="632" height="154" rx="28" fill="url(#card)" stroke="rgba(205,214,224,0.22)" />
      <text class="eyebrow" x="70" y="838">ACTIVE JOB</text>
      <text class="title" x="70" y="882">Closet Door Align</text>

      <g id="button-show-job">
        <rect x="500" y="824" width="84" height="52" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="chipText" x="542" y="850">Show</text>
      </g>

      <g id="chip-location">
        <rect x="594" y="824" width="58" height="52" rx="18" fill="rgba(201,209,219,0.08)" stroke="rgba(230,235,242,0.16)" />
        <text class="chipText" x="623" y="850">supplier</text>
      </g>
    </g>

    <g id="bar-sticky-actions">
      <rect x="44" y="982" width="302" height="74" rx="22" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
      <text class="buttonText" x="195" y="1019">Contract Board</text>
      <rect x="374" y="982" width="302" height="74" rx="22" fill="url(#buttonFill)" stroke="rgba(235,241,248,0.36)" />
      <text class="buttonText" x="525" y="1019">End Shift</text>
    </g>

    <g id="bar-bottom-nav">
      <rect x="44" y="1084" width="632" height="100" rx="28" fill="url(#card)" stroke="rgba(205,214,224,0.22)" />
      <g id="nav-work">
        <rect x="54" y="1094" width="146" height="80" rx="24" fill="url(#buttonFill)" stroke="rgba(235,241,248,0.36)" />
        <text class="navText" x="127" y="1140">Work</text>
      </g>
      <g id="nav-contracts">
        <rect x="210" y="1094" width="146" height="80" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="navText" x="283" y="1140">Contracts</text>
      </g>
      <g id="nav-store">
        <rect x="366" y="1094" width="146" height="80" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="navText" x="439" y="1140">Store</text>
      </g>
      <g id="nav-company">
        <rect x="522" y="1094" width="144" height="80" rx="24" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="navText" x="594" y="1140">Company</text>
      </g>
    </g>
  </g>

  <g id="sheet-supplier" transform="translate(36, 1210)" filter="url(#shadow)">
    <rect x="0" y="0" width="648" height="238" rx="28" fill="url(#card)" stroke="rgba(205,214,224,0.22)" />
    <text class="title" x="24" y="44">Supplier</text>
    <g id="button-close-sheet">
      <rect x="546" y="20" width="78" height="46" rx="18" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
      <text class="chipText" x="585" y="43">Close</text>
    </g>
    <text class="eyebrow" x="24" y="98">SUPPLIER CART</text>
    <rect x="532" y="78" width="92" height="42" rx="16" fill="rgba(201,209,219,0.08)" stroke="rgba(230,235,242,0.16)" />
    <text class="chipText" x="578" y="99">2 lines</text>

    <g id="supplier-list-vertical">
      <g id="supplier-item-1">
        <rect x="24" y="136" width="600" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(235,241,248,0.11)" />
        <text class="body" x="42" y="166">Anchor Set</text>
        <text class="muted" x="42" y="192">$15 each</text>
        <rect x="362" y="150" width="70" height="42" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="chipText" x="397" y="171">Info</text>
        <rect x="462" y="146" width="44" height="44" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="484" y="168">-</text>
        <text class="buttonText" x="536" y="168">2</text>
        <rect x="556" y="146" width="44" height="44" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="578" y="168">+</text>
      </g>

      <g id="supplier-item-2">
        <rect x="24" y="220" width="600" height="74" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(235,241,248,0.11)" />
        <text class="body" x="42" y="250">Board Pack</text>
        <text class="muted" x="42" y="276">$27 each</text>
        <rect x="362" y="234" width="70" height="42" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="chipText" x="397" y="255">Info</text>
        <rect x="462" y="230" width="44" height="44" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="484" y="252">-</text>
        <text class="buttonText" x="536" y="252">1</text>
        <rect x="556" y="230" width="44" height="44" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(205,214,224,0.22)" />
        <text class="buttonText" x="578" y="252">+</text>
      </g>
    </g>
  </g>
</svg>
